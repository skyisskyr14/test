services:
  mysql:
    image: mysql:8.0
    container_name: perf-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: perf_system
    ports:
      - "3306:3306"
    volumes:
      - ../data/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    image: maven:3.9.9-eclipse-temurin-17
    container_name: perf-backend
    working_dir: /app
    command: bash -lc "mvn -U -q -DskipTests spring-boot:run"
    volumes:
      - ../spring:/app
    network_mode: host
    restart: on-failure
    depends_on:
      - mysql

  frontend:
    image: node:20
    container_name: perf-frontend
    working_dir: /app
    command: bash -lc "npm install && npm run dev -- --host"
    volumes:
      - ../web:/app
    network_mode: host
    depends_on:
      - backend
